# This workflow will build a Java project with Gradle and perform SonarCloud analysis
# For more information see: https://help.github.com/actions/language-and-framework-guides/building-and-testing-java-with-gradle

name: CI Build & Analysis

on:
  push:
    branches: [ master, develop ]
  pull_request:
    branches: [ master, develop ]
  workflow_dispatch:

jobs:
  build:
    runs-on: ubuntu-latest

    steps:
      - uses: actions/checkout@v4
        with:
          fetch-depth: 0  # Shallow clones should be disabled for better analysis

      - name: Set up JDK 21
        uses: actions/setup-java@v4
        with:
          java-version: 21
          distribution: temurin

      - name: Cache Gradle packages
        uses: actions/cache@v4
        with:
          path: |
            ~/.gradle/caches
            ~/.gradle/wrapper
          key: ${{ runner.os }}-gradle-${{ hashFiles('**/*.gradle*', 'gradle/wrapper/gradle-wrapper.properties') }}
          restore-keys: |
            ${{ runner.os }}-gradle-

      - name: Cache SonarCloud packages
        uses: actions/cache@v4
        with:
          path: ~/.sonar/cache
          key: ${{ runner.os }}-sonar
          restore-keys: ${{ runner.os }}-sonar

      - name: Build and analyze
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}  # Needed to get PR information
          SONAR_TOKEN: ${{ secrets.SONAR_TOKEN }}
        run: |
          if [ -n "$SONAR_TOKEN" ]; then
            ./gradlew build sonarqube --info --no-daemon
          else
            echo "SONAR_TOKEN not configured, skipping SonarQube analysis"
            ./gradlew build --info --no-daemon
          fi

      - name: Upload test reports
        uses: actions/upload-artifact@v4
        if: always()
        with:
          name: test-reports
          path: |
            kotlin/build/reports/tests/test/
            web/build/reports/tests/test/
            build/reports/jacoco/

      - name: Upload coverage to Codecov
        uses: codecov/codecov-action@v4
        continue-on-error: true
        if: always()
        with:
          files: ./build/reports/jacoco/test/jacocoTestReport.xml
          flags: unittests
          name: codecov-umbrella
          fail_ci_if_error: false
          token: ${{ secrets.CODECOV_TOKEN }}

  # ── Visual Regression Tests ─────────────────────────────────
  visual-regression:
    runs-on: ubuntu-latest
    needs: build
    # Only run on master pushes (not PRs) to reduce CI cost
    if: github.event_name == 'push' && github.ref == 'refs/heads/master'

    steps:
      - uses: actions/checkout@v4

      - name: Set up JDK 21
        uses: actions/setup-java@v4
        with:
          java-version: 21
          distribution: temurin

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: 22
          cache: npm
          cache-dependency-path: web-ui/package-lock.json

      - name: Build frontend
        working-directory: web-ui
        run: npm ci && npm run build

      - name: Install Playwright browsers
        working-directory: web-ui
        run: npx playwright install --with-deps chromium

      - name: Build and start server
        run: |
          ./gradlew :web:installDist --no-daemon
          PORT=25321 ./web/build/install/web/bin/web &
          SERVER_PID=$!
          echo "SERVER_PID=$SERVER_PID" >> $GITHUB_ENV
          for i in $(seq 1 30); do
            if curl -sf http://localhost:25321/ > /dev/null 2>&1; then
              echo "Server ready on port 25321"
              break
            fi
            echo "Waiting for server... ($i/30)"
            sleep 2
          done

      - name: Run visual regression tests
        working-directory: web-ui
        run: npx playwright test --config playwright.config.js || true

      - name: Stop server
        if: always()
        run: kill $SERVER_PID 2>/dev/null || true

      - name: Upload visual regression report
        uses: actions/upload-artifact@v4
        if: always()
        with:
          name: visual-regression-report
          path: |
            web-ui/playwright-report/
            web-ui/e2e/**/*.png
          retention-days: 14

      - name: Upload visual regression diff
        uses: actions/upload-artifact@v4
        if: failure()
        with:
          name: visual-regression-diff
          path: web-ui/e2e/**/*-diff.png
          retention-days: 30
