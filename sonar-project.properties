# SonarCloud configuration
sonar.projectKey=sudoku-solver-bot_sudoku-solver
sonar.organization=sudoku-solver-bot

# This is the name and version displayed in the SonarCloud UI
sonar.projectName=Sudoku Solver
sonar.projectVersion=1.0

# Path is relative to the sonar-project.properties file
sonar.sources=kotlin/src/main/java,web/src/main/kotlin
sonar.tests=kotlin/src/test/java,web/src/test/kotlin

# Encoding of the source code
sonar.sourceEncoding=UTF-8

# Exclusions
sonar.exclusions=**/generated/**,**/resources/**,**/*.html,**/*.css,**/web-ui/**

# Kotlin specific settings
sonar.kotlin.detekt.reportPaths=build/reports/detekt/detekt.xml
sonar.coverage.jacoco.xmlReportPaths=build/reports/jacoco/test/jacocoTestReport.xml

# JavaScript/Vue (for web-ui)
sonar.javascript.lcov.reportPaths=web-ui/coverage/lcov.info
sonar.typescript.lcov.reportPaths=web-ui/coverage/lcov.info
